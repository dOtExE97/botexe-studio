<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bOtExE Studio Overlay</title>
    <style>
      /* Transparenter Canvas für TikTok Live Studio — kein Hintergrund,
         kein Scrollbalken, keine Selektion. */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        user-select: none;
        cursor: none;
      }
      #stage-wrap {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #stage {
        position: relative;
        transform-origin: top left;
      }
      .layer {
        position: absolute;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="stage-wrap"><div id="stage"></div></div>
    <link rel="stylesheet" href="widget-base.css" />
    <script type="module" src="runtime.js"></script>
  </body>
</html>
