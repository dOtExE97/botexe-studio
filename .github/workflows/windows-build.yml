# Windows-Build — baut die Setup-.exe (Squirrel) auf einem Windows-Runner.
# Läuft bei jedem Push auf main + manuell (workflow_dispatch).
# Die .exe liegt danach als Artefakt am Workflow-Lauf (Actions → Lauf → Artifacts).
name: Windows Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Make (Squirrel-Setup)
        run: npm run make --workspace apps/desktop
      - name: Upload Setup-Artefakt
        uses: actions/upload-artifact@v4
        with:
          name: botexe-studio-windows-setup
          path: |
            apps/desktop/out/make/squirrel.windows/x64/*.exe
            apps/desktop/out/make/squirrel.windows/x64/*.nupkg
            apps/desktop/out/make/squirrel.windows/x64/RELEASES
          if-no-files-found: error
          retention-days: 14
